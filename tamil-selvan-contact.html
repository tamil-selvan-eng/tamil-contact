<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #ffffff;
    --off: #f7f7f5;
    --ink: #111111;
    --muted: #888;
    --radius: 14px;
    --gap: 13px;
  }

  body {
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 36px 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--ink);
    line-height: 1.1;
  }

  .header p {
    font-size: 0.78rem;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .divider {
    width: 40px;
    height: 2px;
    background: var(--ink);
    margin: 14px auto 0;
    border-radius: 2px;
  }

  .links {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: var(--gap);
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    border-radius: var(--radius);
    background: var(--off);
    text-decoration: none;
    border: 1.5px solid transparent;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    cursor: pointer;
  }

  .link-card:hover {
    background: var(--white);
    transform: translateY(-2px);
  }

  .icon-box {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon-box svg {
    width: 20px;
    height: 20px;
  }

  /* Brand colours */
  .wa   .icon-box { background: #25D366; border: 1.5px solid #1ebe5d; }
  .wa:hover        { border-color: #25D366; }

  .gmail .icon-box { background: #EA4335; border: 1.5px solid #d93025; }
  .gmail:hover     { border-color: #EA4335; }

  .li   .icon-box  { background: #0A66C2; border: 1.5px solid #0958a8; }
  .li:hover        { border-color: #0A66C2; }

  .gh   .icon-box  { background: #111111; border: 1.5px solid #333; }
  .gh:hover        { border-color: #111111; }

  .port .icon-box  { background: #7C3AED; border: 1.5px solid #6d28d9; }
  .port:hover      { border-color: #7C3AED; }

  .call .icon-box  { background: #16A34A; border: 1.5px solid #15803d; }
  .call:hover      { border-color: #16A34A; }

  .label {
    flex: 1;
  }

  .label span {
    display: block;
    font-size: 0.72rem;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .label strong {
    font-size: 0.97rem;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.01em;
  }

  .arrow {
    color: #ccc;
    font-size: 1.1rem;
    transition: color 0.2s, transform 0.2s;
  }

  .link-card:hover .arrow {
    color: var(--ink);
    transform: translateX(3px);
  }
</style>
</head>
